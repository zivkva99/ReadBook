    margin-bottom: 0.6rem;

  function parseDMY(s) {
    const [d, m, y] = s.split('.').map(Number);
    return new Date(y, m - 1, d);
  }

  function todayKey() {
    const t = new Date();
    return new Date(t.getFullYear(), t.getMonth(), t.getDate()).getTime();
  }

  const bookFilter = document.getElementById('bookFilter');
  BOOKS.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b;
    opt.textContent = b;
    bookFilter.appendChild(opt);
  });

  const tbody = document.getElementById('tbody');
  const emptyState = document.getElementById('emptyState');
  const countLine = document.getElementById('countLine');
  const searchInput = document.getElementById('search');

  let targetRowIndex = -1;
  const tKey = todayKey();
  for (let i = 0; i < DATA.length; i++) {
    if (parseDMY(DATA[i].d).getTime() >= tKey) { targetRowIndex = i; break; }
  }

  function render() {
    const q = searchInput.value.trim();
    const bookSel = bookFilter.value;
    const frag = document.createDocumentFragment();
    let lastBook = null;
    let shown = 0;

    DATA.forEach((row, idx) => {
      if (bookSel && row.b !== bookSel) return;
      if (q && row.b.indexOf(q) === -1) return;

      const tr = document.createElement('tr');
      if (row.b !== lastBook) { tr.classList.add('book-start'); lastBook = row.b; }
      if (idx === targetRowIndex) tr.classList.add('today-row');

      const tdDate = document.createElement('td');
      tdDate.className = 'date-col';
      tdDate.textContent = row.d;

      const tdChap = document.createElement('td');
      tdChap.className = 'chapter-col';
      tdChap.textContent = row.h;

      const tdBook = document.createElement('td');
      tdBook.className = 'book-col';
      tdBook.textContent = row.b;

      tr.appendChild(tdDate);
      tr.appendChild(tdChap);
      tr.appendChild(tdBook);
      frag.appendChild(tr);
      shown++;
    });

    tbody.innerHTML = '';
    tbody.appendChild(frag);
    emptyState.style.display = shown === 0 ? 'block' : 'none';
    countLine.textContent = shown + ' מתוך ' + DATA.length + ' פרקים מוצגים';
  }

  searchInput.addEventListener('input', render);
  bookFilter.addEventListener('change', render);

  document.getElementById('jumpToday').addEventListener('click', () => {
    searchInput.value = '';
    bookFilter.value = '';
    render();
    const row = document.querySelector('tr.today-row');
    if (row) row.scrollIntoView({ behavior: 'smooth', block: 'center' });
  });

  render();
</script>
